name: Cloud CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print runtime version
        run: python --version

      - name: Run app
        run: python app.py

      - name: Run tests
        run: python test_app.py

      - name: Build success message
        run: echo "Build and tests completed successfully"
